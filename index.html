<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0a0a0a;color:#fff;min-height:100vh}
header{padding:2rem;text-align:center;border-bottom:1px solid #333}
nav{display:flex;justify-content:center;gap:2rem;padding:1rem}
nav a{color:#fff;text-decoration:none;opacity:0.7}
nav a:hover{opacity:1}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;padding:2rem;max-width:1000px;margin:0 auto}
.card{background:#1a1a1a;padding:1.5rem;border-radius:8px;transition:transform 0.2s}
.card:hover{transform:translateY(-5px)}
</style>
</head>
<body>
<header>
<h1>Meu Portfolio</h1>
<p>Desenvolvedor & Designer</p>
</header>
<nav><a href="#">Início</a><a href="#">Projetos</a><a href="#">Sobre</a><a href="#">Contato</a></nav>
<div class="grid">
<div class="card"><h3>Projeto 1</h3><p>Descrição do projeto.</p></div>
<div class="card"><h3>Projeto 2</h3><p>Descrição do projeto.</p></div>
<div class="card"><h3>Projeto 3</h3><p>Descrição do projeto.</p></div>
</div>
</body>
</html>
